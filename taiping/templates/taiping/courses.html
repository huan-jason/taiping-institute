{% extends "taiping/base.html" %}

{% block content %}
<style>
    #courses-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, var(--size-content-2));
        justify-content: center;
        gap: 2em;

        margin-top: 2em;
    }

    .card {
        padding-inline: 1em;
    }

    .card-title {
        color: black;
        line-height: 1.5em;
    }

    .card-text {
        line-height: 1.7em;
    }
</style>


<div class="container mb-5">

    <h4 class="text-center mt-5">Taiping Institute Courses</h4>

    <div id="courses-container">

        {% for item in courses %}
        <div class="card">

            <div class="card-body">
                <h5 class="card-title">{{ item.name }}</h5>
                <hr />
                <p class="card-text">
                    {{ item.description }}
                </p>
            </div>

            <div class="d-flex justify-content-between border-top p-3">
                <div>${{ item.course_fee }}</div>
                <a href="/register/{{ item.id }}/" class="btn btn-primary fit-content">Register</a>
            </div>

        </div>
        {%  endfor %}

    </div>


</div>
{% endblock content %}
